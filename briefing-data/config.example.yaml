# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored -- your personal settings stay local.

# Gmail accounts -- email fetching uses a fallback chain per account:
#   1. MCP gmail_search_messages (Claude Desktop with Gmail MCP)
#   2. python fetch_emails.py (requires credentials.json from Google Cloud Console)
#   3. gws gmail CLI (requires gws auth setup)
# Leave empty to skip an account entirely.
personal_gmail: your_personal_email@gmail.com
work_gmail: your_work_email@gmail.com

# Per-account email fetch method (optional, default: "auto")
# Options:
#   "auto"  -- try MCP -> fetch_emails.py -> gws CLI (stop at first success)
#   "mcp"   -- MCP gmail_search_messages only (Claude Desktop with Gmail MCP)
#   "fetch" -- python fetch_emails.py only (requires credentials.json + OAuth token)
#   "gws"   -- gws gmail CLI only (requires gws CLI authenticated via `gws auth`)
# Tip: use "gws" for accounts where credentials.json doesn't have access.
personal_gmail_method: "auto"
work_gmail_method: "auto"

# Output path for the daily briefing (Obsidian vault recommended)
# Leave empty to output in Cowork chat + save to output/ folder in this repo
obsidian_vault_path: ""
# Example: "C:\\Users\\you\\Obsidian Vault"

# Priority email senders (comma-separated names or domains to flag as HIGH)
priority_senders: ""
# Example: "alice, bob, example.com, charlie"

# Email senders to always skip (automated/marketing) -- defaults built into prompt
# Only add extras here; the prompt already skips noreply, newsletters, etc.
extra_skip_senders: ""

# Set to false if you don't have a Tavily MCP server connected.
# Deal searches and VC research will fall back to WebSearch.
tavily_available: true

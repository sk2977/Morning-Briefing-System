# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored -- your personal settings stay local.

# Email accounts -- leave empty to skip an account entirely.
# Both accounts support any backend (Gmail or Microsoft 365).
personal_email: your_personal_email@gmail.com
work_email: your_work_email@domain.com

# Per-account email fetch method (optional, default: "auto")
# Options for both accounts:
#   "auto"  -- try MCP -> fetch_emails.py -> gws CLI (stop at first success; Gmail only)
#   "m365"  -- Microsoft 365 Graph API via m365 CLI (requires m365 CLI setup)
#   "mcp"   -- MCP gmail_search_messages only (Claude Desktop with Gmail MCP)
#   "fetch" -- python fetch_emails.py only (requires credentials.json + OAuth token; Gmail only)
#   "gws"   -- gws gmail CLI only (requires gws CLI authenticated via `gws auth`; Gmail only)
# Tip: use "m365" for Outlook/Office 365 accounts, "auto" or "gws" for Gmail accounts.
personal_email_method: "auto"
work_email_method: "m365"

# Output path for the daily briefing (Obsidian vault recommended)
# Leave empty to output in Cowork chat + save to output/ folder in this repo
obsidian_vault_path: ""
# Example: "C:\\Users\\you\\Obsidian Vault"

# Priority email senders (comma-separated names or domains to flag as HIGH)
priority_senders: ""
# Example: "alice, bob, example.com, charlie"

# Email senders to always skip (automated/marketing) -- defaults built into prompt
# Only add extras here; the prompt already skips noreply, newsletters, etc.
extra_skip_senders: ""

# Set to false if you don't have a Tavily MCP server connected.
# Deal searches and VC research will fall back to WebSearch.
tavily_available: true
